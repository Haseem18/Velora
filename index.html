<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <header>
        <img src="./logo.png" alt="">
        <nav class="btns">
            <button value="all">All</button>
            <button value="Electronics">Electronics</button>
            <button value="Wearables">Wearables</button>
            <button value="Accessories">Accessories</button>
            <button value="Audio">Audio</button>
            <button value="Furniture">Furniture</button>
            <button value="Fashion">Fashion</button>
            <button value="Clothing">Clothing</button>
            <button value="Kitchen">Kitchen</button>
            <button value="Home Decor">Home Decor</button>
            <button value="Fitness">Fitness</button>
            <button value="Stationery">Stationery</button>
        </nav>
        <img src="./menu.png" alt="menu" class="menu_logo hidden">
        <img src="./close.png" alt="close" class="close_logo hidden">
    </header>

    <main>
        
        <section>
            <div class="filter_btns">
                <button value="asc">Sort by Price: Ascending</button>
                <button value="dsc">Sort by Price: Descending</button>
                <button value="above">Above 10K</button>
                <button value="below">Below 10K</button>
                <button value="inStock">In Stock</button>
                <button value="discount">Discount</button>
            </div>
            <div id="products_container">
                
            </div>
        </section>
        
    </main>
    <script src="./main.js"></script>
</body>
</html>
